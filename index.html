<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dylan Johnson | Engineering Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
        }

        /* Header */
        .header {
            padding: 70px 20px 40px;
            text-align: center;
            background: linear-gradient(135deg, #1a1a1a, #000000);
        }

        .header h1 {
            font-size: 44px;
            margin: 0;
        }

        .header p {
            margin-top: 10px;
            color: #bdbdbd;
            font-size: 18px;
        }

        /* Section container */
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 40px 20px;
        }

        /* Card style */
        .card {
            background: #141414;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 12px;
            border: 1px solid #222;
        }

        h2 {
            margin-top: 0;
            font-size: 22px;
            border-left: 4px solid #ffffff;
            padding-left: 10px;
        }

        p {
            color: #cfcfcf;
            line-height: 1.6;
        }

        /* PDF viewer */
        .pdf-box {
            height: 80vh;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Resume button */
        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <h1>Dylan Johnson</h1>
    <p>Mechanical Engineer | CAD Design | Project Engineer</p>
</div>

<div class="container">

    <!-- ABOUT -->
    <div class="card">
        <h2>About</h2>
