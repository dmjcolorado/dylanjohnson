<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dylan Johnson | Engineering Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 60px 20px 30px 20px;
            background: linear-gradient(135deg, #1a1a1a, #000000);
        }

        .header h1 {
            margin: 0;
            font-size: 42px;
            letter-spacing: 1px;
        }

        .header p {
            margin-top: 10px;
            font-size: 18px;
            color: #bbbbbb;
        }

        /* Section titles */
        .section-title {
            text-align: center;
            margin: 40px 0 20px 0;
            font-size: 26px;
            color: #ffffff;
        }

        /* PDF container */
        .pdf-container {
            width: 90%;
            height: 85vh;
            margin: auto;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Resume section */
        .resume {
            text-align: center;
            padding: 60px 20px;
        }

        .resume-box {
            border: 1px solid #333;
            padding: 40px;
            width: 60%;
            margin: auto;
            border-radius: 10px;
            color: #888;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1>Dylan Johnson</h1>
        <p>Mechanical Engineer | CAD Design | Aerospace Systems</p>
    </div>

    <!-- PORTFOLIO SECTION -->
    <div class="section-title">Engineering Portfolio</div>

    <div class="pdf-container">
        <iframe src="johnson_dylan_projects_portfolio.pdf"></iframe>
    </div>

    <!-- RESUME SECTION -->
    <div class="section-title">Resume</div>

    <div class="resume">
        <div class="resume-box">
            <p>Resume section coming soon</p>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        Built and hosted with GitHub Pages
    </div>

</body>
</html>
